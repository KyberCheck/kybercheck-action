name: 'KyberCheck Scanner'
description: 'Scan codebase for quantum-vulnerable cryptography'
author: 'KyberCheck'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  api-key:
    description: 'KyberCheck API Key'
    required: true
  scan-id:
    description: 'Scan ID from KyberCheck dashboard (for website-triggered scans)'
    required: false
  dispatch-token:
    description: 'Dispatch token for authenticated result submission (provided by KyberCheck backend)'
    required: false
  api-url:
    description: 'API URL for results submission'
    required: false
    default: 'https://kybercheck.com'
  path:
    description: 'Path to scan'
    required: false
    default: '.'
  exclude:
    description: 'Comma-separated glob patterns to exclude from scanning'
    required: false
  languages:
    description: 'Comma-separated list of languages to scan'
    required: false
  before-sha:
    description: 'Git SHA before the push (for scanning only changed files in push events)'
    required: false
  after-sha:
    description: 'Git SHA after the push (for scanning only changed files in push events)'
    required: false
  base-ref:
    description: 'Base branch for PR diff (for scanning only changed files in PR workflow_dispatch events)'
    required: false
  fail-on-critical:
    description: 'Fail build on critical vulnerabilities'
    required: false
    default: 'true'
  discover-apis:
    description: 'Discover and probe auth endpoints (OIDC, JWKS) found in source code for quantum-vulnerable algorithms'
    required: false
  api-scan-target:
    description: 'API endpoint URL or JWT token to scan directly (for standalone API scans)'
    required: false
  api-scan-type:
    description: 'Type of API scan target: oidc, jwks, or jwt'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Install KyberCheck CLI
      shell: bash
      run: |
        set -euo pipefail
        echo "⬇️ Downloading KyberCheck CLI..."
        DOWNLOAD_URL="https://github.com/KyberCheck/kybercheck-cli/releases/latest/download/kybercheck-linux-amd64"
        curl -fsSL --retry 3 --retry-delay 5 --retry-all-errors "$DOWNLOAD_URL" -o /usr/local/bin/kybercheck || {
          echo "Binary download failed, falling back to cargo install..."
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          command -v cargo >/dev/null 2>&1 || { echo "::error::cargo not found after rustup install"; exit 1; }
          timeout 300 cargo install kybercheck --force || {
            echo "::error::cargo install timed out or failed"
            exit 1
          }
        }
        chmod +x /usr/local/bin/kybercheck
        echo "✅ KyberCheck CLI installed successfully."

    - name: Check scan config
      id: preflight
      shell: bash
      env:
        KYBERCHECK_API_KEY: ${{ inputs.api-key }}
        INPUT_SCAN_ID: ${{ inputs.scan-id }}
        INPUT_API_URL: ${{ inputs.api-url }}
        GH_REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        # For dispatched scans (scan-id present), the webhook already checked — always run.
        if [ -n "$INPUT_SCAN_ID" ]; then
          echo "skip=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        REPO="$GH_REPO"
        API_URL="$INPUT_API_URL"
        RESPONSE=$(curl -sf --retry 2 --retry-delay 3 --connect-timeout 10 --max-time 30 -H "X-API-Key: $KYBERCHECK_API_KEY" \
          "${API_URL}/api/v1/repositories/scan-config?repo=${REPO}" 2>/dev/null || echo '{"enabled":true,"scanOnPush":true,"scanOnPr":true}')

        # Parse response (use || to prevent grep exit code 1 from killing step under set -eo pipefail)
        ENABLED=$(echo "$RESPONSE" | grep -o '"enabled":[a-z]*' | cut -d: -f2) || ENABLED="true"
        SCAN_ON_PUSH=$(echo "$RESPONSE" | grep -o '"scanOnPush":[a-z]*' | cut -d: -f2) || SCAN_ON_PUSH="true"
        SCAN_ON_PR=$(echo "$RESPONSE" | grep -o '"scanOnPr":[a-z]*' | cut -d: -f2) || SCAN_ON_PR="true"

        if [ "$ENABLED" = "false" ]; then
          echo "⏭️ Scanning is disabled for $REPO — skipping."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$SCAN_ON_PUSH" = "false" ]; then
          echo "⏭️ Push scanning is disabled for $REPO — skipping."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ "$SCAN_ON_PR" = "false" ]; then
          echo "⏭️ PR scanning is disabled for $REPO — skipping."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "skip=false" >> "$GITHUB_OUTPUT"

    - name: Prepare scan scope
      if: steps.preflight.outputs.skip != 'true'
      id: scope
      shell: bash
      env:
        INPUT_BEFORE_SHA: ${{ inputs.before-sha }}
        INPUT_AFTER_SHA: ${{ inputs.after-sha }}
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        INPUT_PATH: ${{ inputs.path }}
      run: |
        set -euo pipefail
        cd "$GITHUB_WORKSPACE"

        # Ensure sufficient git history for diff operations
        if git rev-parse --is-shallow-repository 2>/dev/null | grep -q true; then
          echo "  Deepening shallow clone for diff analysis..."
          git fetch --deepen=100 2>/dev/null || git fetch --unshallow 2>/dev/null || true
        fi

        CHANGED_FILES=""
        SCAN_TYPE="full_audit"

        # Validate git ref inputs to prevent injection (only hex SHAs and safe branch names)
        validate_sha() {
          if [ -n "$1" ] && ! echo "$1" | grep -qE '^[0-9a-fA-F]{7,40}$'; then
            echo "::error::Invalid SHA format: refusing to use potentially unsafe value"
            exit 1
          fi
        }
        validate_ref() {
          if [ -n "$1" ] && ! echo "$1" | grep -qE '^[a-zA-Z0-9][a-zA-Z0-9_./-]{0,254}$'; then
            echo "::error::Invalid ref format: refusing to use potentially unsafe value"
            exit 1
          fi
        }

        validate_sha "$INPUT_BEFORE_SHA"
        validate_sha "$INPUT_AFTER_SHA"
        validate_ref "$INPUT_BASE_REF"

        if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
          echo "📋 PR detected — scanning only changed files"
          SCAN_TYPE="pr_scan"
          git fetch origin "$GITHUB_BASE_REF" --quiet 2>/dev/null || true
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "origin/$GITHUB_BASE_REF"...HEAD 2>/dev/null || echo "")

        elif [ -n "$INPUT_BEFORE_SHA" ] && [ -n "$INPUT_AFTER_SHA" ]; then
          echo "📋 Push (dispatched) — scanning only changed files"
          echo "  Before: $INPUT_BEFORE_SHA"
          echo "  After:  $INPUT_AFTER_SHA"
          # Handle initial push (all-zeros before SHA)
          if echo "$INPUT_BEFORE_SHA" | grep -qE '^0+$'; then
            echo "  Initial push — falling back to full scan"
          else
            SCAN_TYPE="diff_scan"
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "$INPUT_BEFORE_SHA" "$INPUT_AFTER_SHA" 2>/dev/null || echo "")
          fi

        elif [ -n "$INPUT_BASE_REF" ]; then
          echo "📋 PR (dispatched) — scanning only changed files vs $INPUT_BASE_REF"
          SCAN_TYPE="pr_scan"
          git fetch origin "$INPUT_BASE_REF" --quiet 2>/dev/null || true
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "origin/$INPUT_BASE_REF"...HEAD 2>/dev/null || echo "")

        elif [ "$GITHUB_EVENT_NAME" = "push" ]; then
          echo "📋 Direct push — scanning only changed files"
          BEFORE_SHA="${GITHUB_EVENT_BEFORE:-}"
          validate_sha "$BEFORE_SHA"
          AFTER_SHA="$GITHUB_SHA"
          if [ -n "$BEFORE_SHA" ] && ! echo "$BEFORE_SHA" | grep -qE '^0+$'; then
            SCAN_TYPE="diff_scan"
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "$BEFORE_SHA" "$AFTER_SHA" 2>/dev/null || echo "")
          fi
        fi

        # If we have changed files, scope the scan to them
        if [ -n "$CHANGED_FILES" ]; then
          FILE_COUNT=$(echo "$CHANGED_FILES" | wc -l | tr -d ' ')
          echo "  Found $FILE_COUNT changed file(s):"
          DISPLAY_COUNT=0
          while IFS= read -r f; do
            DISPLAY_COUNT=$((DISPLAY_COUNT + 1))
            if [ "$DISPLAY_COUNT" -le 20 ]; then
              echo "    • $f"
            fi
          done <<< "$CHANGED_FILES"
          if [ "$FILE_COUNT" -gt 20 ]; then
            echo "    ... and $((FILE_COUNT - 20)) more"
          fi

          SCAN_DIR="$GITHUB_WORKSPACE/.kybercheck-scan"
          rm -rf "$SCAN_DIR"
          mkdir -p "$SCAN_DIR"
          COPIED=0
          SKIPPED=0
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              case "$file" in *..* ) echo "::warning::Skipping path with traversal: $file"; SKIPPED=$((SKIPPED + 1)); continue ;; esac
              dir="$SCAN_DIR/$(dirname "$file")"
              mkdir -p "$dir"
              cp "$file" "$SCAN_DIR/$file" || { echo "::warning::Failed to copy $file"; SKIPPED=$((SKIPPED + 1)); continue; }
              COPIED=$((COPIED + 1))
            else
              echo "  ⚠ Skipping (not found): $file"
              SKIPPED=$((SKIPPED + 1))
            fi
          done <<< "$CHANGED_FILES"
          echo "  Copied $COPIED file(s) to scan directory ($SKIPPED skipped)"
          echo "scan_path=$SCAN_DIR" >> "$GITHUB_OUTPUT"
        else
          echo "📋 Full repository scan"
          SCAN_TYPE="full_audit"
          echo "scan_path=$INPUT_PATH" >> "$GITHUB_OUTPUT"
        fi

        echo "scan_type=$SCAN_TYPE" >> "$GITHUB_OUTPUT"

    - name: Run KyberCheck Scan
      if: steps.preflight.outputs.skip != 'true'
      shell: bash
      env:
        KYBERCHECK_API_KEY: ${{ inputs.api-key }}
        INPUT_SCAN_PATH: ${{ steps.scope.outputs.scan_path }}
        INPUT_SCAN_TYPE: ${{ steps.scope.outputs.scan_type }}
        INPUT_API_URL: ${{ inputs.api-url }}
        INPUT_SCAN_ID: ${{ inputs.scan-id }}
        INPUT_DISPATCH_TOKEN: ${{ inputs.dispatch-token }}
        INPUT_EXCLUDE: ${{ inputs.exclude }}
        INPUT_LANGUAGES: ${{ inputs.languages }}
        INPUT_DISCOVER_APIS: ${{ inputs.discover-apis }}
        INPUT_API_SCAN_TARGET: ${{ inputs.api-scan-target }}
        INPUT_API_SCAN_TYPE: ${{ inputs.api-scan-type }}
        INPUT_FAIL_ON_CRITICAL: ${{ inputs.fail-on-critical }}
      run: |
        set -euo pipefail
        # Mask secrets so they never appear in CI logs
        echo "::add-mask::$KYBERCHECK_API_KEY"
        if [ -n "$INPUT_DISPATCH_TOKEN" ]; then
          echo "::add-mask::$INPUT_DISPATCH_TOKEN"
        fi

        echo "========================================"
        echo "🔍 KyberCheck Quantum Vulnerability Scan"
        echo "========================================"
        echo ""
        echo "📋 Configuration:"
        echo "  Path: $INPUT_SCAN_PATH"
        echo "  API URL: $INPUT_API_URL"
        echo "  Scan ID: $INPUT_SCAN_ID"
        echo "  Exclude: $INPUT_EXCLUDE"
        echo "  Languages: $INPUT_LANGUAGES"
        echo "  API Key: [MASKED]"
        echo ""

        # Build command arguments as an array (safe from injection)
        CMD_ARGS=("kybercheck" "scan" "$INPUT_SCAN_PATH")

        # Pass scan-id if provided
        if [ -n "$INPUT_SCAN_ID" ]; then
          CMD_ARGS+=("--scan-id" "$INPUT_SCAN_ID")
        fi

        # Pass dispatch token if provided (required for submitting results to dashboard)
        if [ -n "$INPUT_DISPATCH_TOKEN" ]; then
          CMD_ARGS+=("--dispatch-token" "$INPUT_DISPATCH_TOKEN")
        else
          # No dispatch token — run local-only scan (don't submit to API)
          CMD_ARGS+=("--no-submit")
        fi

        # Pass API URL
        if [ -n "$INPUT_API_URL" ]; then
          CMD_ARGS+=("--api-url" "$INPUT_API_URL")
        fi

        # Pass exclude patterns
        if [ -n "$INPUT_EXCLUDE" ]; then
          CMD_ARGS+=("--exclude" "$INPUT_EXCLUDE")
        fi

        # Pass language filter
        if [ -n "$INPUT_LANGUAGES" ]; then
          CMD_ARGS+=("--languages" "$INPUT_LANGUAGES")
        fi

        # Pass scan type so the scanner and API know whether this is a diff scan
        if [ -n "$INPUT_SCAN_TYPE" ] && [ "$INPUT_SCAN_TYPE" != "full_audit" ]; then
          CMD_ARGS+=("--scan-type" "$INPUT_SCAN_TYPE")
        fi

        # Discover and probe auth endpoints found in source code
        if [ -n "$INPUT_DISCOVER_APIS" ] && [ "$INPUT_DISCOVER_APIS" != "false" ]; then
          CMD_ARGS+=("--discover-apis")
        fi

        # Standalone API scan (OIDC/JWKS/JWT)
        if [ -n "$INPUT_API_SCAN_TARGET" ]; then
          CMD_ARGS+=("--api-scan-target" "$INPUT_API_SCAN_TARGET")
          if [ -n "$INPUT_API_SCAN_TYPE" ]; then
            CMD_ARGS+=("--api-scan-type" "$INPUT_API_SCAN_TYPE")
          fi
        fi

        # Fail on critical vulnerabilities if requested
        if [ "$INPUT_FAIL_ON_CRITICAL" = "true" ]; then
          CMD_ARGS+=("--fail-on-vuln" "--min-severity" "critical")
        fi

        echo "🚀 Executing: kybercheck scan [args redacted for security]"
        echo "========================================"
        echo ""

        CLI_EXIT=0
        timeout 600 "${CMD_ARGS[@]}" || CLI_EXIT=$?
        if [ $CLI_EXIT -eq 124 ]; then
          echo "::error::KyberCheck CLI timed out after 10 minutes"
          exit 1
        elif [ $CLI_EXIT -ne 0 ]; then
          echo "::error::KyberCheck CLI exited with code $CLI_EXIT"
          exit $CLI_EXIT
        fi

        echo ""
        echo "========================================"
        echo "✅ Scan complete!"
        echo "========================================"