name: 'KyberCheck Scanner'
description: 'Scan codebase for quantum-vulnerable cryptography'
author: 'KyberCheck'

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  api-key:
    description: 'KyberCheck API Key'
    required: true
  scan-id:
    description: 'Scan ID from KyberCheck dashboard (for website-triggered scans)'
    required: false
  dispatch-token:
    description: 'Dispatch token for authenticated result submission (provided by KyberCheck backend)'
    required: false
  api-url:
    description: 'API URL for results submission'
    required: false
    default: 'https://kybercheck.com'
  path:
    description: 'Path to scan'
    required: false
    default: '.'
  exclude:
    description: 'Comma-separated glob patterns to exclude from scanning'
    required: false
  languages:
    description: 'Comma-separated list of languages to scan'
    required: false
  before-sha:
    description: 'Git SHA before the push (for scanning only changed files in push events)'
    required: false
  after-sha:
    description: 'Git SHA after the push (for scanning only changed files in push events)'
    required: false
  base-ref:
    description: 'Base branch for PR diff (for scanning only changed files in PR workflow_dispatch events)'
    required: false
  fail-on-critical:
    description: 'Fail build on critical vulnerabilities'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Install KyberCheck CLI
      shell: bash
      run: |
        echo "⬇️ Downloading KyberCheck CLI..."
        DOWNLOAD_URL="https://github.com/KyberCheck/kybercheck-cli/releases/latest/download/kybercheck-linux-amd64"
        curl -fsSL "$DOWNLOAD_URL" -o /usr/local/bin/kybercheck || {
          echo "Binary download failed, falling back to cargo install..."
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          cargo install kybercheck --force
        }
        chmod +x /usr/local/bin/kybercheck
        echo "✅ KyberCheck CLI installed successfully."

    - name: Check scan config
      id: preflight
      shell: bash
      env:
        KYBERCHECK_API_KEY: ${{ inputs.api-key }}
      run: |
        # For dispatched scans (scan-id present), the webhook already checked — always run.
        if [ -n "${{ inputs.scan-id }}" ]; then
          echo "skip=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        REPO="${{ github.repository }}"
        API_URL="${{ inputs.api-url }}"
        RESPONSE=$(curl -sf -H "X-API-Key: $KYBERCHECK_API_KEY" \
          "${API_URL}/api/v1/repositories/scan-config?repo=${REPO}" 2>/dev/null || echo '{"enabled":true,"scanOnPush":true,"scanOnPr":true}')

        ENABLED=$(echo "$RESPONSE" | grep -o '"enabled":[a-z]*' | cut -d: -f2)
        SCAN_ON_PUSH=$(echo "$RESPONSE" | grep -o '"scanOnPush":[a-z]*' | cut -d: -f2)
        SCAN_ON_PR=$(echo "$RESPONSE" | grep -o '"scanOnPr":[a-z]*' | cut -d: -f2)

        if [ "$ENABLED" = "false" ]; then
          echo "⏭️ Scanning is disabled for $REPO — skipping."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$SCAN_ON_PUSH" = "false" ]; then
          echo "⏭️ Push scanning is disabled for $REPO — skipping."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ "$GITHUB_EVENT_NAME" = "pull_request" ] && [ "$SCAN_ON_PR" = "false" ]; then
          echo "⏭️ PR scanning is disabled for $REPO — skipping."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "skip=false" >> "$GITHUB_OUTPUT"

    - name: Prepare scan scope
      if: steps.preflight.outputs.skip != 'true'
      id: scope
      shell: bash
      run: |
        cd "$GITHUB_WORKSPACE"
        CHANGED_FILES=""

        if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
          echo "📋 PR detected — scanning only changed files"
          git fetch origin "$GITHUB_BASE_REF" --quiet 2>/dev/null || true
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "origin/$GITHUB_BASE_REF"...HEAD 2>/dev/null || echo "")

        elif [ -n "${{ inputs.before-sha }}" ] && [ -n "${{ inputs.after-sha }}" ]; then
          echo "📋 Push (dispatched) — scanning only changed files"
          echo "  Before: ${{ inputs.before-sha }}"
          echo "  After:  ${{ inputs.after-sha }}"
          # Handle initial push (all-zeros before SHA)
          if echo "${{ inputs.before-sha }}" | grep -qE '^0+$'; then
            echo "  Initial push — falling back to full scan"
          else
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "${{ inputs.before-sha }}" "${{ inputs.after-sha }}" 2>/dev/null || echo "")
          fi

        elif [ -n "${{ inputs.base-ref }}" ]; then
          echo "📋 PR (dispatched) — scanning only changed files vs ${{ inputs.base-ref }}"
          git fetch origin "${{ inputs.base-ref }}" --quiet 2>/dev/null || true
          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "origin/${{ inputs.base-ref }}"...HEAD 2>/dev/null || echo "")

        elif [ "$GITHUB_EVENT_NAME" = "push" ]; then
          echo "📋 Direct push — scanning only changed files"
          BEFORE_SHA="${GITHUB_EVENT_BEFORE:-}"
          AFTER_SHA="$GITHUB_SHA"
          if [ -n "$BEFORE_SHA" ] && ! echo "$BEFORE_SHA" | grep -qE '^0+$'; then
            CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR "$BEFORE_SHA" "$AFTER_SHA" 2>/dev/null || echo "")
          fi
        fi

        # If we have changed files, scope the scan to them
        if [ -n "$CHANGED_FILES" ]; then
          FILE_COUNT=$(echo "$CHANGED_FILES" | wc -l | tr -d ' ')
          echo "  Found $FILE_COUNT changed file(s):"
          DISPLAY_COUNT=0
          while IFS= read -r f; do
            DISPLAY_COUNT=$((DISPLAY_COUNT + 1))
            if [ "$DISPLAY_COUNT" -le 20 ]; then
              echo "    • $f"
            fi
          done <<< "$CHANGED_FILES"
          if [ "$FILE_COUNT" -gt 20 ]; then
            echo "    ... and $((FILE_COUNT - 20)) more"
          fi

          SCAN_DIR="$GITHUB_WORKSPACE/.kybercheck-scan"
          rm -rf "$SCAN_DIR"
          mkdir -p "$SCAN_DIR"
          COPIED=0
          SKIPPED=0
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              dir="$SCAN_DIR/$(dirname "$file")"
              mkdir -p "$dir"
              cp "$file" "$SCAN_DIR/$file"
              COPIED=$((COPIED + 1))
            else
              echo "  ⚠ Skipping (not found): $file"
              SKIPPED=$((SKIPPED + 1))
            fi
          done <<< "$CHANGED_FILES"
          echo "  Copied $COPIED file(s) to scan directory ($SKIPPED skipped)"
          echo "scan_path=$SCAN_DIR" >> "$GITHUB_OUTPUT"
        else
          echo "📋 Full repository scan"
          echo "scan_path=${{ inputs.path }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Run KyberCheck Scan
      if: steps.preflight.outputs.skip != 'true'
      shell: bash
      env:
        KYBERCHECK_API_KEY: ${{ inputs.api-key }}
      run: |
        echo "========================================"
        echo "🔍 KyberCheck Quantum Vulnerability Scan"
        echo "========================================"
        echo ""
        echo "📋 Configuration:"
        echo "  Path: ${{ steps.scope.outputs.scan_path }}"
        echo "  API URL: ${{ inputs.api-url }}"
        echo "  Scan ID: ${{ inputs.scan-id }}"
        echo "  Exclude: ${{ inputs.exclude }}"
        echo "  Languages: ${{ inputs.languages }}"
        echo "  API Key: ${KYBERCHECK_API_KEY:0:10}..."
        echo ""

        CMD="kybercheck scan ${{ steps.scope.outputs.scan_path }}"

        # Pass scan-id if provided
        if [ -n "${{ inputs.scan-id }}" ]; then
          CMD="$CMD --scan-id ${{ inputs.scan-id }}"
        fi

        # Pass dispatch token if provided (required for submitting results to dashboard)
        if [ -n "${{ inputs.dispatch-token }}" ]; then
          CMD="$CMD --dispatch-token ${{ inputs.dispatch-token }}"
        else
          # No dispatch token — run local-only scan (don't submit to API)
          CMD="$CMD --no-submit"
        fi

        # Pass API URL
        if [ -n "${{ inputs.api-url }}" ]; then
          CMD="$CMD --api-url ${{ inputs.api-url }}"
        fi

        # Pass exclude patterns
        if [ -n "${{ inputs.exclude }}" ]; then
          CMD="$CMD --exclude \"${{ inputs.exclude }}\""
        fi

        # Pass language filter
        if [ -n "${{ inputs.languages }}" ]; then
          CMD="$CMD --languages \"${{ inputs.languages }}\""
        fi

        # NOTE: PR file scoping is handled by the "Prepare scan scope" step above,
        # which copies only changed files to .kybercheck-scan/. The scanner receives
        # that narrowed directory as its scan path — no extra flags needed.
        # Future: once scanner v0.1.8+ is published, we can add --scan-type / --base-branch
        # flags here for the scanner's internal merge-base diff as a secondary check.

        # Fail on critical vulnerabilities if requested
        if [ "${{ inputs.fail-on-critical }}" = "true" ]; then
          CMD="$CMD --fail-on-vuln --min-severity critical"
        fi

        echo "🚀 Executing: $CMD"
        echo "========================================"
        echo ""

        eval $CMD

        echo ""
        echo "========================================"
        echo "✅ Scan complete!"
        echo "========================================"